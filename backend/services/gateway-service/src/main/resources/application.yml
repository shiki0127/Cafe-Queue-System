server:
  port: 8080

spring:
  application:
    name: gateway-service
  autoconfigure:
    exclude:
      - com.alibaba.cloud.nacos.endpoint.NacosDiscoveryEndpointAutoConfiguration
      - org.springframework.cloud.autoconfigure.LifecycleMvcEndpointAutoConfiguration
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}

cafequeue:
  security:
    jwt-secret: ${JWT_SECRET}
    token-ttl-seconds: 7200
  routes:
    order-service: ${ORDER_SERVICE_URL:http://order-service:8081}
    recipe-inventory-service: ${INVENTORY_SERVICE_URL:http://recipe-inventory-service:8082}
    vending-queue-service: ${QUEUE_SERVICE_URL:http://vending-queue-service:8083}
    notification-service: ${NOTIFICATION_SERVICE_URL:http://notification-service:8084}
    marketing-coupon-service: ${COUPON_SERVICE_URL:http://marketing-coupon-service:8085}
    vending-device-service: ${DEVICE_SERVICE_URL:http://vending-device-service:8086}
  gateway:
    rate-limit-per-minute: ${GATEWAY_RATE_LIMIT_PER_MINUTE:120}

management:
  endpoints:
    web:
      exposure:
        include: health,info
